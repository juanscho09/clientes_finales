<ion-header>
  <ion-toolbar>
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="12" class="ion-text-center container-logo">
        <img src="./assets/imgs/app/logo.png" alt="Logo" style="height:150px" />
      </ion-col>
    </ion-row>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" autocomplete="off">
      <ion-row>
        <ion-col size="12">
          <ion-list>
            <ion-item>
              <ion-label position="floating">
                <ion-icon name="person"></ion-icon> Usuario
              </ion-label>
              <ion-input formControlName="username" type="text"></ion-input>
            </ion-item>
            <div *ngIf="loginForm.controls.username.invalid && (loginForm.controls.username.dirty || loginForm.controls.username.touched)">
              <span class="error">El campo usuario es requerido.</span>
            </div>

            <ion-item>
              <ion-label position="floating">
                <ion-icon name="lock"></ion-icon> Contraseña
              </ion-label>
              <ion-input formControlName="password" type="password"></ion-input>
            </ion-item>
            <div *ngIf="loginForm.controls.password.invalid && (loginForm.controls.password.dirty || loginForm.controls.password.touched)">
              <span class="error">El campo contraseña es requerido.</span>
            </div>
          </ion-list>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size="12">
          <ion-button expand="block" type="submit" [disabled]="loginForm.invalid">INGRESAR</ion-button>
        </ion-col>
      </ion-row>
    </form>
  </ion-grid>
</ion-content>
